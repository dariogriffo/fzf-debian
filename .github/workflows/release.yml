name: Build fzf for Debian

on:
  workflow_dispatch:
    inputs:
      fzf_version:
        description: The version of fzf to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-fzf:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fzf-debian
        uses: actions/checkout@v4

      - name: Validate upstream license permits paid distribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.fzf_version }}

      - name: Build fzf
        run: ./build.sh ${{ inputs.fzf_version }} ${{ inputs.build_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: fzf_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fzf-debian
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.fzf_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            fzf_*.dsc
            fzf_*.orig.tar.gz
            fzf_*.debian.tar.xz

  release-fzf:
    name: Release fzf for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-fzf
      - build-src
    steps:
      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            fzf_*.deb
            fzf_*.dsc
            fzf_*.orig.tar.gz
            fzf_*.debian.tar.xz
          name: ${{ inputs.fzf_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.fzf_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
